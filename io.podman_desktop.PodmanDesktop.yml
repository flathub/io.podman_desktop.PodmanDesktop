app-id: io.podman_desktop.PodmanDesktop
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: run.sh
separate-locales: false
finish-args:
  - "--socket=x11"
  - "--share=ipc"
  - "--device=dri"
  - "--filesystem=home"
  # Read-only access to /usr and /etc for managed-configuration support.
  # Flatpak sandboxes these directories, so we can't use --filesystem=/usr/share/podman-desktop:ro directly.
  # host-os:ro only exposes /usr and parts of /etc (not the full filesystem).
  # See: https://github.com/flatpak/flatpak/issues/5575
  # See: https://man7.org/linux/man-pages/man5/flatpak-metadata.5.html (host-os section)
  - "--filesystem=host-os:ro"
  - "--filesystem=xdg-run/podman:create"
  - "--filesystem=xdg-run/containers:create"
  - "--filesystem=/run/docker.sock"
  - "--share=network"
  - "--talk-name=org.freedesktop.Notifications"
  - "--talk-name=org.kde.StatusNotifierWatcher"
  - "--talk-name=org.freedesktop.Flatpak"
  - "--talk-name=org.freedesktop.secrets"
  - "--talk-name=org.kde.kwalletd6"
  # required to fix cursor scaling on wayland https://github.com/electron/electron/issues/19810 when the user uses --socket=wayland in their flatpak run
  - "--env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons"
  - "--env=XDG_SESSION_TYPE=x11"
modules:
  # Podman Desktop sources
  - name: podman-desktop
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node24/bin:/run/build/podman-desktop/bin
      env:
        npm_config_nodedir: /usr/lib/sdk/node24
        XDG_CACHE_HOME: /run/build/podman-desktop/flatpak-node/cache
        DEBUG: electron-rebuild,electron-builder,@electron/get:index
        electron_config_cache: /run/build/podman-desktop/electron-cache
    build-commands:
      - chmod 755 pnpm
      - mkdir bin && mv pnpm bin/
      # Display tooling version
      - node --version
      - pnpm --version
      - sed -i "s#postinstall\":\ \"\(.*\)\"#postinstall\":\ \"\"#g" package.json # remove playwright install step that downloads at runtime files from internet
      - mkdir pnpm-store && mv v10 pnpm-store/
      - echo home is $HOME
      - pnpm install --loglevel debug --offline --frozen-lockfile --store-dir ./pnpm-store
      # Replace segment key
      - sed -i -r -e "s/SEGMENT_KEY = '.*'/SEGMENT_KEY = '$(echo -n 'ODdEZUpwVFhmU05pemF5MUNxQXhsSzViYUQ4VUE1NUQ=' | base64 --decode)'/" packages/main/src/plugin/telemetry/telemetry.ts
      - . ./electron-builder-env.sh; pnpm run build
      - . ./electron-builder-env.sh; ./node_modules/.bin/electron-builder build --config .electron-builder.config.cjs --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - for size in {32,64,128,256,512}; do rsvg-convert -w $size -h $size -f png -o "${FLATPAK_ID}.png" "buildResources/icon.svg"; echo "generating ${FLATPAK_ID} png file for size ${size}"; install -p -Dm644 "${FLATPAK_ID}.png" -t "${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/"; done;
      # add scalable svg icon
      - install -p -Dm644 "buildResources/icon.svg" "${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg";
      # add metainfo
      - install -Dm644 ".flatpak-appdata.xml" "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      # add desktop file
      - install -Dm644 .flatpak.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - sed -i -e 's$https://raw.githubusercontent.com/containers/podman-desktop/media/screenshot.png$https://github.com/podman-desktop/podman-desktop/raw/refs/tags/v1.19.1/website/static/img/features/homepage.webp$g' /app/share/applications/${FLATPAK_ID}.desktop
      # Install run script
      - install -Dm755 -t /app/bin/ run.sh
    sources:
      # pnpm tool used to build the project
      - type: file
        url: https://github.com/pnpm/pnpm/releases/download/v10.28.0/pnpm-linux-x64
        dest-filename: pnpm
        sha256: 348e863d17a62411a65f900e8d91395acabae9e9237653ccc3c36cb385965f28
        only-arches:
          - x86_64
      - type: file
        url: https://github.com/pnpm/pnpm/releases/download/v10.28.0/pnpm-linux-arm64
        dest-filename: pnpm
        sha256: 5bf35f1927d5ea0aa76408504f834e3089679d9e18342ab19502a28fb0116391
        only-arches:
          - aarch64
      # source code of Podman Desktop:  
      - type: archive
        url: https://github.com/containers/podman-desktop/archive/refs/tags/v1.25.1.tar.gz
        sha256: 82fc38b4d2b71ad3ef3d0f49780514639f31f92b251999ab37114e4b8fdd62b7
      # all dependencies being used for x64 arch  
      - type: archive
        url: https://github.com/containers/podman-desktop/releases/download/v1.25.1/store-cache-pnpm-amd64.tgz
        sha256: a7e274d8995178131618c26f7024fa3ecd3f285860392f73b989bc153dc12720
        only-arches:
          - x86_64
      # all dependencies being used for arm64 arch   
      - type: archive
        url: https://github.com/containers/podman-desktop/releases/download/v1.25.1/store-cache-pnpm-arm64.tgz
        sha256: d689be0d270efc30e58f2993705ef96da45388a2f7db961ebe9ebee4b892f019
        only-arches:
          - aarch64
      # electron used for arm64   
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.0.0/electron-v40.0.0-linux-arm64.zip
        sha256: 46969d090510b26af41d7cde74cab15a9ad35eb45e61e976076626f2db3589a1
        dest: electron-cache/53c9206f2ce6317e815f82acd761cafe8ea94b88fb25bb51d46b593b6a5d9d2b/
        only-arches:
          - aarch64
      # electron used for x64   
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.0.0/electron-v40.0.0-linux-x64.zip
        sha256: 2ac22df42a4368cdd93ff9f9f25c7f04b9157143a3a3a06d4f01ae0dbb4e6fd5
        dest: electron-cache/53c9206f2ce6317e815f82acd761cafe8ea94b88fb25bb51d46b593b6a5d9d2b/
        only-arches:
          - x86_64
          # - generated-sources.json
      - type: script
        dest-filename: run.sh
        commands:
          # Wrapper to launch the app
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - zypak-wrapper.sh /app/main/podman-desktop "$@"
      - type: script
        dest-filename: electron-builder-env.sh
        commands:
          - export MODE=production
          - export ELECTRON_CACHE="$(pwd)/electron-cache/53c9206f2ce6317e815f82acd761cafe8ea94b88fb25bb51d46b593b6a5d9d2b"
          - export ELECTRON_BUILDER_ARCH_ARGS=$(case "$FLATPAK_ARCH" in "i386") echo "--ia32" ;; "x86_64") echo "--x64" ;; "arm") echo "--armv7l" ;; "aarch64") echo "--arm64" ;; esac)
